# FlashDiffusion | LoRA Fine-Tuning
# Train LoRA adapters on custom images with SD 1.5
# Usage: flashdiffusion train --config configs/flashdiffusion_lora_training.yaml

model:
  name: FlashDiffusion
  model_id: "runwayml/stable-diffusion-v1-5"
  resolution: [512, 512]

data:
  train_data: data/my_images
  instance_prompt: "a photo of sks subject"
  resolution: 512
  center_crop: true
  num_workers: 4

train:
  method: lora
  max_train_steps: 1000
  learning_rate: 1.0e-4
  batch_size: 1
  gradient_accumulation_steps: 4
  lr_scheduler: cosine
  lr_warmup_steps: 100
  save_dir: workspace/lora_training
  save_every_n_steps: 500
  mixed_precision: fp16
  enable_gradient_checkpointing: true
  seed: 42

  # LoRA settings
  lora_rank: 4
  lora_alpha: 4.0
  lora_dropout: 0.0
  lora_target_modules: ["to_q", "to_v", "to_k", "to_out.0"]
